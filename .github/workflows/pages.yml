# PLATEAU Viewer を GitHub Pages に静的デプロイする
# （viewer/ は静的モードを備えており、サーバなしでカタログAPIを直接利用する）
name: Deploy PLATEAU Viewer to GitHub Pages

on:
  push:
    branches: [claude/mlit-platform-tool-jx6o5k, master]
    paths:
      - "viewer/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: viewer
      - id: deployment
        uses: actions/deploy-pages@v4
